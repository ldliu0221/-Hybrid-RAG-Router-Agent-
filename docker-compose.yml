version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .
    container_name: rag_agent_qa_app
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file:
      - .env
    volumes:
      - ./:/app

volumes:
  qdrant_storage: